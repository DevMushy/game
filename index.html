<!doctype html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#000000" />
  <meta
    name="description"
    content="TMordo game. Raccogli tutte le palline senza farti raggiungere dallo spazzolino."
  />
  <title>Denture Maze</title>
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="game-shell">
    <header class="game-header">
      <div class="brand">
        <p class="eyebrow">TMORDO ARCADE · BUILD 0.9</p>
      </div>

      <div class="stats" aria-label="Statistiche di gioco">
        <div class="stat">
          <span>Punteggio</span>
          <strong id="score">0</strong>
        </div>
        <div class="stat">
          <span>Palline</span>
          <strong id="pellets">0</strong>
        </div>
        <div class="stat">
          <span>Record</span>
          <strong id="best-score">0</strong>
        </div>
      </div>
    </header>

    <section class="objective-strip" aria-live="polite">
      <span>Obiettivo</span>
      <strong id="objective-label">TMordi tutto tranne lo spazzolino!</strong>
    </section>

    <section class="game-card">
      <canvas id="game" aria-label="Labirinto di TMordo"></canvas>

      <div id="overlay" class="overlay visible">
        <div class="overlay-panel">
          <p class="eyebrow">TMORDO ARCADE</p>
          <h2 id="overlay-title">Pronto?</h2>
          <p id="overlay-text">TMordi Tutto!</p>
          <button id="start-button" type="button">Gioca</button>
        </div>
      </div>
    </section>

    <div class="actions">
      <div class="action-buttons">
        <button id="new-map-button" class="secondary-button" type="button">
          Nuova partita
        </button>
        <!--button id="test-mega-button" class="secondary-button featured-button" type="button">
          Prova trasformazione
        </button-->
        <button id="audio-toggle" class="secondary-button" type="button" aria-pressed="false">
          Audio: ON
        </button>
      </div>
      <p id="control-hint" class="keyboard-hint">Frecce / WASD · P mette in pausa</p>
    </div>


    <footer class="game-footer">
<span><a href="https://tmordo.example.com">Instagram</a></span>
    </footer>
  </main>

  <script src="game.js"></script>
</body>
</html>
